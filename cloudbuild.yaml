steps:
  # Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/armorclaw-landing:$BUILD_ID"
      - "-t"
      - "gcr.io/$PROJECT_ID/armorclaw-landing:latest"
      - "."
    timeout: 1200s

  # Push the Docker image to Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/armorclaw-landing:$BUILD_ID"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/armorclaw-landing:latest"

  # Deploy to Cloud Run
  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - "run"
      - "deploy"
      - "armorclaw-landing"
      - "--image"
      - "gcr.io/$PROJECT_ID/armorclaw-landing:$BUILD_ID"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--max-instances"
      - "10"
      - "--min-instances"
      - "1"
      - "--port"
      - "8080"
      - "--timeout"
      - "300"
      - "--concurrency"
      - "80"
      - "--update-annotations"
      - "run.googleapis.com/invoker-iam-disabled=true"

# Store images in Google Container Registry
images:
  - "gcr.io/$PROJECT_ID/armorclaw-landing:$BUILD_ID"
  - "gcr.io/$PROJECT_ID/armorclaw-landing:latest"

# Build timeout
timeout: 1800s

# Options
options:
  machineType: "N1_HIGHCPU_8"
  logging: CLOUD_LOGGING_ONLY
